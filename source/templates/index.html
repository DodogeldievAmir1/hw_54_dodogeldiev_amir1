{% extends 'base.html' %}

{% block content %}
    <div class="bg-light py-4">
        <div class="container">
            <div class="d-flex justify-content-center mb-5 mt-3">
                <h1 class="fs-1 text-success">Buy goods profitably!</h1>
            </div>
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3 mt-4">
                {% for product in products %}
                    <div class="col">
                        <div class="card h-100 shadow-sm">
                            <img src="{{ product.image }}" class="card-img-top" alt="{{ product.title }}"
                                 style="height: 200px; object-fit: cover;">
                            <div class="card-body d-flex flex-column">
                                <h6 class="card-title fw-bold">{{ product.title }}</h6>
                                <p class="text-muted small mb-1">{{ product.category }}</p>
                                <p class="text-success fw-bold mt-auto">{{ product.price }} сом</p>
                                <a href="{% url 'detail' product.id %}" class="btn btn-outline-info btn-sm mt-2">Detail</a>
                            </div>
                        </div>
                    </div>
                {% empty %}
                    <div class="col-12">
                        <div class="alert alert-secondary">The assortment is still empty</div>
                        <a href="{% url 'add' %}" class="btn btn-primary">Add product</a>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
{% endblock %}
